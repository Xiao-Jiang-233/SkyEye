name: Sync README

on:
  push:
    branches: [main]
    paths:
      - '_OVERVIEW.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate README.md from _OVERVIEW.md
        run: cp _OVERVIEW.md README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet README.md; then
            git add README.md
            git commit -m "docs: sync README from _OVERVIEW.md [skip ci]"
            git push
          else
            echo "No changes to README.md"
          fi
